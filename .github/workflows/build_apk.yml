name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Flutter Project Structure
        run: |
          flutter create cse_chat_app --project-name=cse_chat
          cd cse_chat_app
          flutter pub add firebase_core firebase_auth cloud_firestore google_fonts intl
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/g' android/app/build.gradle
          sed -i 's/minSdkVersion 19/minSdkVersion 23/g' android/app/build.gradle
          
          rm -f lib/main.dart
          cp ../cse_chat_complete.dart lib/main.dart
          
          # تعديل ذكي لتعطيل الفايربيز مؤقتاً عشان يتخطى الشاشة البيضاء ويفتح فوراً
          sed -i 's/await Firebase.initializeApp(/ \/\/ await Firebase.initializeApp(/g' lib/main.dart

      - name: Install dependencies
        run: |
          cd cse_chat_app
          flutter pub get

      - name: Build APK
        run: |
          cd cse_chat_app
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cse-chat-apk
          path: cse_chat_app/build/app/outputs/flutter-apk/app-release.apk
