name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Flutter Project Structure
        run: |
          flutter create cse_chat_app --project-name=cse_chat
          rm -rf cse_chat_app/lib/main.dart
          cp cse_chat_complete.dart cse_chat_app/lib/main.dart
          cd cse_chat_app
          # هنا ضفنا كل المكاتب اللي كودك مستخدمها بالظبط لإنهاء المشكلة ✅
          flutter pub add firebase_core firebase_auth cloud_firestore google_fonts intl

      - name: Install dependencies
        run: |
          cd cse_chat_app
          flutter pub get

      - name: Build APK
        run: |
          cd cse_chat_app
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cse-chat-apk
          path: cse_chat_app/build/app/outputs/flutter-apk/app-release.apk
