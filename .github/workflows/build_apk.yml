name: Build Flutter APK

on:
  push:
    branches:
      - main  # تأكد إن ده اسم الفرع عندك (main أو master)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4 # تم التحديث لتخطي الـ Lock والـ Deprecation
        with:
          name: cse-chat-apk
          path: build/app/outputs/flutter-apk/app-release.apk
